<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Granted</title>
<style>
    body {
        margin: 0;
        background: #000;
        color: #00ff41;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 800px;
        max-width: 90%;
        border: 3px solid #00ff41;
        padding: 40px;
        text-align: center;
        box-shadow: 0 0 25px #00ff41;
        background: #050505;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 10px;
        text-shadow: 0 0 15px #00ff41;
    }

    .status {
        font-size: 24px;
        margin-bottom: 30px;
    }

    .message {
        font-size: 28px;
        margin: 30px 0;
        line-height: 1.6;
    }

    .winner {
        font-size: 36px;
        font-weight: bold;
        color: #ffd700;
        text-shadow: 0 0 15px #ffd700;
    }

    .trophies {
        font-size: 60px;
        margin: 25px 0;
    }

    .footer {
        margin-top: 40px;
        font-size: 18px;
        opacity: 0.8;
    }

    .box {
        border: 1px dashed #00ff41;
        padding: 20px;
        margin-top: 25px;
    }

    @media print {
        body {
            background: #000 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>ACCESS GRANTED</h1>

    <div class="status">
        SYSTEM STATUS: VERIFIED
    </div>

    <div class="trophies">🏆 🏆 🏆</div>

    <div class="message">
        You successfully unlocked the PDF file.<br>
        Authentication Result: <strong>SUCCESS</strong><br>
        Security Check: <strong>PASSED</strong>
    </div>

    <div class="winner">
        🎉 YOU ARE A WINNER! 🎉
    </div>

    <div class="box">
        USER STATUS: WINNER<br>
        ACCESS LEVEL: ADMIN<br>
        SESSION STATUS: ACTIVE
    </div>

    <div class="trophies">🏆 🎖️ ⭐ 🏆</div>

    <div class="footer">
        Mission Complete • Access Granted
    </div>
</div>

</body>
</html>
